    <title>Order Form</title>
</head>
<body bgcolor="beige">

    <h2>Place your order here</h2>

    <form>
    
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="coffee">Choose Coffee:</label><br>
        <select id="coffee" name="coffee">
            <option value="Espresso">Espresso</option>
            <option value="Latte">Latte</option>
            <option value="Americano">Americano</option>
            <option value="Cappuccino">Cappuciono</option>
        </select><br><br>

        <label>Size:</label><br>
        <input type="radio" name="size" value="Small"> Small
        <input type="radio" name="size" value="Medium"> Medium
        <input type="radio" name="size" value="Large"> Large<br><br>

        <label>Extras:</label><br>
        <input type="checkbox" name="extras" value="Sugar"> Sugar<br>
        <input type="checkbox" name="extras" value="Milk"> Milk<br>
        <input type="checkbox" name="extra" value="Cream"> Cream<br><br>

        <button type="submit">Place Order</button>
    </form>

<center>
    <img src="Cup size line icon set_ Small, medium and large take away drink.  Vector illustration" alt="Order" width="450">
</center>
    
</body>
